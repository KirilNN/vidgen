openapi: 3.1.0
info:
  title: Vidgen API
  version: 0.0.1
  summary: Public REST API for the Vidgen platform.
  description: |
    Single source of truth for the Vidgen HTTP contract.

    - Served by `services/api` (Fastify) via `@fastify/swagger`.
    - Consumed by `@vidgen/sdk-ts` (typed client generated by `openapi-typescript`).
    - Also acts as the manifest for the ChatGPT plugin / custom GPT integration
      (arch §3.10 F10.4).

    This file is the **only** place to add or change endpoints. Run
    `pnpm sdk:gen` after every edit so the generated SDK stays in sync; CI
    fails the build otherwise.
  license:
    name: Apache-2.0
servers:
  - url: http://localhost:3001
    description: Local development (Mode A)
  - url: https://api.example.com
    description: Production placeholder — replace per environment
tags:
  - name: system
    description: Liveness, readiness, and platform health.
paths:
  /health:
    get:
      operationId: getHealth
      summary: Liveness probe
      description: |
        Returns `{ status: "ok" }` if the API process is up. Cheap and
        unauthenticated — safe for load balancers and uptime checks. Does not
        verify downstream dependencies (see future `/ready` for that).
      tags: [system]
      responses:
        "200":
          description: API process is up.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                ok:
                  value:
                    status: ok
components:
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
          description: Always `ok` when the service responds at all.
