openapi: 3.1.0
info:
  title: Vidgen API
  version: 0.0.2
  summary: Public REST API for the Vidgen platform.
  description: |
    Single source of truth for the Vidgen HTTP contract.

    - Served by `services/api` (Fastify) via `@fastify/swagger`.
    - Consumed by `@vidgen/sdk-ts` (typed client generated by `openapi-typescript`).
    - Also acts as the manifest for the ChatGPT plugin / custom GPT integration
      (arch §3.10 F10.4).

    This file is the **only** place to add or change endpoints. Run
    `pnpm sdk:gen` after every edit so the generated SDK stays in sync; CI
    fails the build otherwise.
  license:
    name: Apache-2.0
servers:
  - url: http://localhost:3001
    description: Local development (Mode A) — direct (host port 3001).
  - url: https://api.localhost
    description: Local development (Mode A) — via Caddy on 443.
  - url: https://api.example.com
    description: Production placeholder — replace per environment.
tags:
  - name: system
    description: Liveness, readiness, and platform health.
  - name: identity
    description: Authenticated caller identity and workspace membership.
  - name: workspaces
    description: Workspace (a.k.a. tenant) CRUD.
  - name: webhooks
    description: |
      Per-workspace outbound webhook subscriptions (T-023). Subscribers
      register a URL and a list of event types; the API HMAC-signs the
      payload and POSTs it to the URL when matching events fire.
paths:
  /health:
    get:
      operationId: getHealth
      summary: Liveness probe
      description: |
        Unauthenticated liveness probe. Returns the API process status, the
        package version, and the current server timestamp. Cheap and safe for
        load balancers / uptime checks. Does not verify downstream
        dependencies — see future `/ready` for that.
      tags: [system]
      responses:
        "200":
          description: API process is up.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                ok:
                  value:
                    ok: true
                    version: "0.0.2"
                    ts: "2025-05-28T10:46:08.102Z"
  /me:
    get:
      operationId: getMe
      summary: Caller identity + workspace memberships
      description: |
        Returns the calling user (resolved from the verified Bearer JWT) along
        with the workspaces they belong to. On first call the user record is
        upserted by email (see `users.email` UNIQUE constraint in
        `services/api/src/db/schema.ts`). The response is the canonical
        bootstrap payload used by the web shell (T-016) to render the
        workspace switcher.
      tags: [identity]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Authenticated caller.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /workspaces:
    get:
      operationId: listWorkspaces
      summary: List the caller's workspaces
      description: |
        Returns every workspace the calling user is a member of, with the
        caller's role inside each. Cross-tenant by design — bound to the
        caller via the `app.user_id` GUC + the `self_bootstrap_read` RLS
        policies introduced in migration 0002.
      tags: [workspaces]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Caller's workspaces.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceList"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    post:
      operationId: createWorkspace
      summary: Create a workspace
      description: |
        Creates a new workspace (a.k.a. tenant) and adds the caller as its
        first `owner`. The workspace_id is server-generated (UUID) so the
        client never has to guess. The new workspace is immediately listed
        by `GET /workspaces` for the caller, and is invisible to every
        other user (verified by the multi-tenant smoke test).
      tags: [workspaces]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Workspace created; caller is its owner.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "400":
          description: Invalid request body.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /workspaces/{workspaceId}/webhooks:
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
        description: Workspace identifier the subscription belongs to.
    get:
      operationId: listWebhooks
      summary: List webhooks registered in the workspace
      description: |
        Returns every webhook subscription registered for the given
        workspace, newest first. The plaintext `secret` is NEVER
        returned by this endpoint — only the metadata fields. Callers
        who lost the secret must delete and re-register.
      tags: [webhooks]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Subscriptions in the workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookList"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: Caller is not a member of the workspace.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    post:
      operationId: createWebhook
      summary: Register a webhook
      description: |
        Registers a new outbound webhook. The response includes a
        **plaintext** `secret` field — this is the only time the API
        returns it. Store it now; subsequent requests will only return
        the metadata. The API uses the secret to compute the
        `X-Vidgen-Signature` header (HMAC-SHA256) on every delivery.

        Signature format (Stripe-style):
        `X-Vidgen-Signature: t=<unix_seconds>,v1=<hex_sha256>` where
        the signed string is `"<unix_seconds>.<canonical_body>"`.
      tags: [webhooks]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookRequest"
      responses:
        "201":
          description: Subscription registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookWithSecret"
        "400":
          description: Invalid request body.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: Caller is not a member of the workspace.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /workspaces/{workspaceId}/webhooks/{id}:
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      operationId: deleteWebhook
      summary: Remove a webhook subscription
      tags: [webhooks]
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Subscription removed.
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: Caller is not a member of the workspace.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Webhook not found in this workspace.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Keycloak-issued OIDC access token. The API verifies the signature
        against the realm JWKS (`KEYCLOAK_JWKS_URL`) and the `iss` claim
        against `KEYCLOAK_ISSUER_URL`.
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [ok, version, ts]
      properties:
        ok:
          type: boolean
          description: True when the API process is up.
        version:
          type: string
          description: Version string from the API package.json (e.g. `0.0.2`).
        ts:
          type: string
          format: date-time
          description: ISO-8601 timestamp from the server clock at response time.
    User:
      type: object
      additionalProperties: false
      required: [userId, email]
      properties:
        userId:
          type: string
          format: uuid
          description: Internal user id (UUID generated on first sight of the email).
        email:
          type: string
          format: email
        displayName:
          type: string
          nullable: true
    WorkspaceRole:
      type: string
      enum: [owner, editor, viewer]
      description: |
        Workspace-level role. Mirrors the realm roles in Keycloak's `app` realm
        (T-013).
    Workspace:
      type: object
      additionalProperties: false
      required: [workspaceId, name, region, tier, role, createdAt]
      properties:
        workspaceId:
          type: string
          description: Stable workspace identifier (used as the tenant key in every other table).
        name:
          type: string
        region:
          type: string
          description: Data-residency region (arch §11). Defaults to `local`.
        tier:
          type: string
          description: Workspace tier (free / paid). Defaults to `free`.
        role:
          $ref: "#/components/schemas/WorkspaceRole"
        createdAt:
          type: string
          format: date-time
    WorkspaceList:
      type: object
      additionalProperties: false
      required: [workspaces]
      properties:
        workspaces:
          type: array
          items:
            $ref: "#/components/schemas/Workspace"
    Me:
      type: object
      additionalProperties: false
      required: [user, workspaces]
      properties:
        user:
          $ref: "#/components/schemas/User"
        workspaces:
          type: array
          items:
            $ref: "#/components/schemas/Workspace"
    CreateWorkspaceRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Human-readable workspace name. Displayed in the workspace switcher.
    EventType:
      type: string
      description: |
        Event subject names the platform publishes (see `@vidgen/events`).
        Webhooks subscribe to a subset of these.
      enum:
        - asset.ingested
        - asset.transcribed
        - project.rendered
        - render.failed
        - clip.proposed
        - clip.approved
        - publish.completed
    Webhook:
      type: object
      additionalProperties: false
      required: [id, workspaceId, url, events, createdAt]
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
        url:
          type: string
          format: uri
        events:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/EventType"
        createdAt:
          type: string
          format: date-time
    WebhookList:
      type: object
      additionalProperties: false
      required: [webhooks]
      properties:
        webhooks:
          type: array
          items:
            $ref: "#/components/schemas/Webhook"
    WebhookWithSecret:
      allOf:
        - $ref: "#/components/schemas/Webhook"
        - type: object
          required: [secret]
          properties:
            secret:
              type: string
              description: |
                Plaintext HMAC secret. Returned only on creation. Store it
                now — the API will never return it again.
    CreateWebhookRequest:
      type: object
      additionalProperties: false
      required: [url, events]
      properties:
        url:
          type: string
          format: uri
          maxLength: 2048
          description: HTTPS (or HTTP in dev) endpoint that receives the signed POST.
        events:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/EventType"
    ProblemDetails:
      type: object
      additionalProperties: true
      required: [type, title, status]
      description: RFC 7807 problem details object.
      properties:
        type:
          type: string
          format: uri
          description: URI reference identifying the problem type.
          default: about:blank
        title:
          type: string
          description: Short human-readable summary of the problem type.
        status:
          type: integer
          minimum: 100
          maximum: 599
          description: HTTP status code generated by the origin server.
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence.
        instance:
          type: string
          format: uri
          description: URI reference that identifies the specific occurrence.
