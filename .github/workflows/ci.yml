name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  docs-check:
    name: docs-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required docs exist
        shell: bash
        run: |
          set -euo pipefail
          required=(
            "README.md"
            "decisions.md"
            "docs/architecture.md"
            "docs/build-plan.md"
            "docs/tickets.md"
            "docs/hosting-options.md"
            "docs/free-tier-catalog.md"
            "docs/decisions.md"
            "docs/agent-runbook.md"
            "docs/product-specifications/00-README.md"
            "docs/product-specifications/01-capture.md"
            "docs/product-specifications/02-edit.md"
            "docs/product-specifications/03-create.md"
            "docs/product-specifications/04-enhance.md"
            "docs/product-specifications/05-translate.md"
            "docs/product-specifications/06-repurpose.md"
            "docs/product-specifications/07-distribute.md"
            "docs/product-specifications/08-operate.md"
            "docs/product-specifications/09-trust-compliance.md"
            "docs/product-specifications/10-api-integrations.md"
            "docs/product-specifications/11-vertical-packs.md"
          )
          missing=0
          for f in "${required[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "::error file=$f::Required file is missing"
              missing=1
            fi
          done
          exit "$missing"

      - name: Check for empty docs
        shell: bash
        run: |
          set -euo pipefail
          empty=0
          while IFS= read -r -d '' f; do
            if [[ ! -s "$f" ]]; then
              echo "::error file=$f::Documentation file is empty"
              empty=1
            fi
          done < <(find docs -type f -name '*.md' -print0)
          exit "$empty"
