# vidgen — Docker Compose stack
#
# Originally scaffolded by T-003 (profile structure + busybox placeholders).
# Real services replace placeholders as their owning tickets land:
#   * T-010 (this revision): postgres real, core-placeholder removed.
#   * T-021: worker-base + worker-{light,media,ai-cpu,ai-gpu} real;
#     media/ai-cpu/ai-gpu busybox placeholders removed.
#   * T-022: NATS JetStream real; realtime-placeholder removed.
#   * T-023: Novu self-host (api+worker+ws+dashboard) + MongoDB added to
#     the `core` profile (ADR D-015 documents the MongoDB choice).
#
# Each *remaining* profile carries a tiny placeholder service (`busybox`,
# ~5 MB, multi-arch) running `/bin/true` so that
# `docker compose --profile <name> config` and `up -d` validate end-to-end
# before later tickets wire in the real services per docs/architecture.md §4.1.
#
# Profiles (architecture.md §4.1):
#   core      Postgres, Redis, MinIO, Keycloak, Caddy, API, Web  (always on)
#   media     ffmpeg-worker, mlt-worker, remotion-worker
#   ai-cpu    whisper-cpu, piper, ollama (small), argos-translate, rembg, lama
#   ai-gpu    whisperx-gpu, xtts-gpu, sam2, propainter, livepoortrait, vllm
#   realtime  LiveKit SFU, Hocuspocus, NATS JetStream
#   obs       Prometheus, Grafana, Loki, Tempo, OpenTelemetry collector
#   dev       Mailpit, MinIO console, pgAdmin, Temporal Web
#
# GPU usage: see compose.gpu.override.yml for the device-reservation skeleton.
# Run with:
#   docker compose --env-file .env up -d                       # default (no profile == no services)
#   docker compose --profile core --profile media --profile ai-cpu up -d
#   docker compose --profile core --profile ai-gpu -f docker-compose.yml -f compose.gpu.override.yml up -d
#   docker compose down -v                                     # tear down + remove volumes

name: vidgen

# Named volumes the later real services will mount.
# Declared now so that the compose file is the single source of truth for
# durable state. Empty until T-010 (pg_data), T-012 (minio_data), T-017
# (redis_data), and T-070 (models) wire them in.
volumes:
  pg_data:
  minio_data:
  models:
  redis_data:
  # Shared one-shot prep volume so `keycloak-init` (T-013) can hand the
  # rendered realm import file to the `keycloak` server container without
  # forcing the server image to know about our env-var conditionals.
  keycloak_realm:
  # Caddy persistence (T-014). `caddy_data` holds the **local CA** that
  # mints leaf certs for *.localhost — once the developer has installed
  # this CA in their host keychain, every restart of the container must
  # reuse it, otherwise browser warnings reappear. `down -v` wipes it on
  # purpose; the README documents the re-install flow.
  caddy_data:
  caddy_config:
  # NATS JetStream durable storage (T-022). Streams + consumer state
  # live here; survives container restarts. `down -v` resets the event
  # log, which is fine for dev but operators on a long-lived host
  # should NOT pass -v when restarting NATS.
  nats_data:
  # Novu's MongoDB operational store (T-023, ADR D-015). Holds Novu's
  # workflows, subscribers, message logs, and scheduling state. Does NOT
  # hold any vidgen data — that is in Postgres / MinIO / Qdrant per
  # arch §5.1. Wiped by `down -v`; Novu re-seeds on next boot.
  mongo_data:

# Single user-defined bridge network. All services (placeholder or real) join
# this network so they can reach each other by service name.
networks:
  appnet:
    driver: bridge

# Reusable anchor: the smallest multi-arch no-op container, used as a stand-in
# until each profile gets real services. `busybox` is ~5 MB, available for
# linux/amd64, linux/arm64, linux/arm/v7, etc., and `/bin/true` exits 0
# immediately — perfect for `compose config` validation and a clean `up -d`
# without consuming resources. (The ticket text suggested `tianon/true`, but
# that image is amd64-only and breaks the Apple-Silicon developer workflow;
# busybox preserves the no-op intent on every supported architecture.)
x-placeholder: &placeholder
  image: busybox:1.36
  command: ["true"]
  restart: "no"
  networks: [appnet]

services:
  # --- core ---------------------------------------------------------------
  # Postgres 16 + pgvector (T-010). Custom image is built from
  # ./postgres/Dockerfile which copies ./postgres/init/*.sql into the
  # standard /docker-entrypoint-initdb.d so the official entrypoint runs
  # them once on first cluster init (extensions, app role, RLS helpers).
  #
  # Architecture references:
  #   - §5.1 — Postgres 16 + pgvector, pg_trgm, pgcrypto
  #   - §11  — RLS gates every tenant table by workspace_id
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    image: vidgen/postgres:16-pgvector
    container_name: vidgen-postgres
    profiles: [core]
    restart: unless-stopped
    environment:
      # The official postgres entrypoint hard-codes the names
      # POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB for *cluster
      # bootstrap* (the cluster's superuser + initial database). We want
      # those to be the SUPERUSER identity, NOT the service identity, so
      # that the `app` role we create in init/01-app-role.sql can be
      # non-superuser and RLS actually applies to it.
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-vidgen}
      # Surfaced to init/01-app-role.sql via backtick `echo` substitution
      # inside that script. These are the credentials services use at
      # runtime (POSTGRES_USER / POSTGRES_PASSWORD in the application env
      # namespace; see .env.example).
      APP_DB_USER: ${POSTGRES_USER:-app}
      APP_DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      # Stable, transcript-friendly locale.
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      # Host:container. Exposed on 5432 for local devs (psql, pgAdmin,
      # Drizzle migrations from T-011). Inside the network, services reach
      # it as `postgres:5432`.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks: [appnet]
    healthcheck:
      # pg_isready ships with the official image. -U / -d match the
      # superuser identity the entrypoint set up so we test the *real* app
      # database, not the built-in `postgres` maintenance DB.
      test:
        - "CMD-SHELL"
        - 'pg_isready -U "${POSTGRES_SUPERUSER:-postgres}" -d "${POSTGRES_DB:-vidgen}"'
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # MinIO — S3-compatible object storage (T-012).
  #
  # Architecture references:
  #   - §5.1 — buckets media-raw / media-derived / media-chunks / public
  #   - §E2  — source media immutable, derivatives rebuildable
  #            (versioning ON on media-raw)
  #
  # Image pinning policy:
  #   Pin a dated RELEASE tag. MinIO publishes multi-arch (amd64+arm64)
  #   images per release; this lets Apple-Silicon devs run the same image
  #   as the server fleet. Renovate/Dependabot can bump.
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: vidgen-minio
    profiles: [core]
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-change-me}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
      # Region label, only matters for SDK clients that send it back to us.
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      # Surface the console at /minio/* when behind a reverse proxy (T-014).
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-http://localhost:9001}
    ports:
      # 9000 = S3 API; 9001 = web console.
      # The console binding is dev-only — Caddy (T-014) will front it at
      # https://minio.localhost and the host binding will go away.
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks: [appnet]
    healthcheck:
      # The server exposes a cluster-aware /minio/health/live endpoint.
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  # MinIO bootstrap sidecar (T-012). One-shot: creates the four buckets,
  # enables versioning on media-raw, attaches the public-read policy.
  # Exits 0 on success; non-zero on failure (surfaces in `docker compose ps -a`).
  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: vidgen-minio-init
    profiles: [core]
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_INTERNAL_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-change-me}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
      MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW:-media-raw}
      MINIO_BUCKET_DERIVED: ${MINIO_BUCKET_DERIVED:-media-derived}
      MINIO_BUCKET_CHUNKS: ${MINIO_BUCKET_CHUNKS:-media-chunks}
      MINIO_BUCKET_PUBLIC: ${MINIO_BUCKET_PUBLIC:-public}
      MINIO_PUBLIC_POLICY_FILE: /etc/minio/public-readonly.json
    entrypoint: ["/bin/sh", "/etc/minio/init.sh"]
    volumes:
      - ./minio/init.sh:/etc/minio/init.sh:ro
      - ./minio/public-readonly.json:/etc/minio/public-readonly.json:ro
    networks: [appnet]

  # Keycloak DB + realm prep sidecar (T-013). One-shot, before keycloak:
  #   - Creates the dedicated keycloak DB + role inside the T-010 cluster
  #     (idempotent; the T-010 init scripts only run on first cluster boot
  #     and would skip an existing pg_data volume).
  #   - Renders the realm import file to a shared volume, conditionally
  #     stripping the dev test user when ENV != dev.
  keycloak-init:
    image: postgres:16-alpine
    container_name: vidgen-keycloak-init
    profiles: [core]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENV: ${ENV:-dev}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_SUPERUSER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_SUPERUSER_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-vidgen}
      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME:-keycloak}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER:-keycloak}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-change-me}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me}
      KEYCLOAK_CLIENT_SECRET_API: ${KEYCLOAK_CLIENT_SECRET_API:-change-me}
      KEYCLOAK_REALM_SRC: /realm-src/realm-export.json
      KEYCLOAK_IMPORT_DIR: /shared/realm
    entrypoint: ["/bin/sh", "/etc/keycloak/init.sh"]
    volumes:
      - ./keycloak/init.sh:/etc/keycloak/init.sh:ro
      - ./keycloak/realm-export.json:/realm-src/realm-export.json:ro
      - keycloak_realm:/shared/realm
    networks: [appnet]

  # Keycloak server (T-013). Uses the realm file that keycloak-init wrote
  # to the shared volume. We deliberately use `start-dev` here — it auto-
  # configures dev defaults (HTTP-only on 8080, dev cache, etc.) which is
  # exactly what Mode A wants. The production-mode (`start`) command will
  # land with T-211 / T-212 alongside the proxy + TLS config.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: vidgen-keycloak
    profiles: [core]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak-init:
        condition: service_completed_successfully
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-change-me}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      # Initial admin credentials, used only on first boot to bootstrap the
      # master realm superuser. After that the admin is in the DB.
      # Keycloak 26 renamed the env vars from KEYCLOAK_ADMIN[_PASSWORD] to
      # KC_BOOTSTRAP_ADMIN_USERNAME/PASSWORD; we pass both for forward and
      # backward compatibility with operator scripts.
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-change-me}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-change-me}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me}
      # KEYCLOAK_CLIENT_SECRET_API is not consumed by the server — the
      # client secret lives in the DB after import. `keycloak-init` is the
      # one that materializes it into the realm file via jq.
    command:
      - "start-dev"
      - "--import-realm"
    volumes:
      - keycloak_realm:/opt/keycloak/data/import:ro
    ports:
      # Dev-only host binding; Caddy (T-014) will front this at
      # https://auth.localhost.
      - "${KEYCLOAK_HTTP_PORT:-8080}:8080"
    networks: [appnet]
    healthcheck:
      # Keycloak 26 ships UBI-minimal: no curl/wget/nc. Use bash's /dev/tcp
      # to GET the master-realm discovery doc and check for HTTP 200 in the
      # response status line. This proves the listener is up and the realm
      # importer has finished (the smoke script in scripts/keycloak-smoke.sh
      # makes the stronger assertion that realm `app` and the two clients
      # also exist).
      test:
        - "CMD-SHELL"
        - "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /realms/master/.well-known/openid-configuration HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200 OK'"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Novu self-host (T-023) — notification infrastructure for outbound
  # webhook fan-out (arch §3.8 F8.9, §3.10 F10.2, §11).
  #
  # The Novu CE bundle is API + Worker + WS + Dashboard, all sharing
  # Redis (DragonflyDB on db_index=2 so our own cache doesn't collide)
  # and **MongoDB** (Novu's operational store — see ADR D-015 in
  # decisions.md). Our application data stays in Postgres; MongoDB is
  # Novu's private filesystem and is never read or written by us.
  #
  # The acceptance criterion for T-023 (registered webhook → signed POST
  # on `asset.ingested`) is satisfied by the API's in-process
  # `WebhookNotifier` (services/api/src/notifier/) which does NOT depend
  # on these containers being up. Novu is provisioned alongside so that
  # later phase-12 features (in-app inbox, Slack/Teams channels) can land
  # without a profile-shuffle.
  mongodb:
    image: mongo:8.0.4
    container_name: vidgen-mongodb
    profiles: [core]
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-novu}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-change-me}
    volumes:
      - mongo_data:/data/db
    # No host port binding by design — only Novu containers on `appnet`
    # may reach Mongo. Compensating control for the lack of RLS analog
    # (ADR D-015).
    networks: [appnet]
    healthcheck:
      test:
        - "CMD"
        - "mongosh"
        - "--quiet"
        - "--username"
        - "${MONGO_INITDB_ROOT_USERNAME:-novu}"
        - "--password"
        - "${MONGO_INITDB_ROOT_PASSWORD:-change-me}"
        - "--authenticationDatabase"
        - "admin"
        - "--eval"
        - "db.adminCommand('ping').ok"
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s

  novu-api:
    image: ghcr.io/novuhq/novu/api:3.15.0
    container_name: vidgen-novu-api
    profiles: [core]
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      # `IS_SELF_HOSTED` flips Novu out of cloud-mode signup gates so the
      # local admin user is provisioned via the dashboard's first-run flow.
      IS_SELF_HOSTED: "true"
      # Public URLs that Novu mints into its own emails / links. Defaults
      # match the Caddy reverse-proxy layout (T-014).
      API_ROOT_URL: ${NOVU_API_ROOT_URL:-http://localhost:${NOVU_API_PORT:-3030}}
      FRONT_BASE_URL: ${NOVU_DASHBOARD_URL:-http://localhost:${NOVU_DASHBOARD_PORT:-4000}}
      # Connection strings.
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-novu}:${MONGO_INITDB_ROOT_PASSWORD:-change-me}@mongodb:27017/novu-db?authSource=admin
      MONGO_MIN_POOL_SIZE: ${MONGO_MIN_POOL_SIZE:-1}
      MONGO_MAX_POOL_SIZE: ${MONGO_MAX_POOL_SIZE:-10}
      MONGO_AUTO_CREATE_INDEXES: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # DragonflyDB has no auth in our dev compose; omit REDIS_PASSWORD.
      REDIS_DB_INDEX: 2
      REDIS_CACHE_SERVICE_HOST: redis
      REDIS_CACHE_SERVICE_PORT: 6379
      # Disable Novu's local S3 store — we never put media into Novu's
      # internal storage; webhook/email templates carry only metadata.
      S3_LOCAL_STACK: ""
      # Secrets — REUSE our APP_SECRET as the JWT signing key so the
      # operator only manages one master secret in dev; production should
      # set NOVU_*_SECRET explicitly.
      JWT_SECRET: ${NOVU_JWT_SECRET:-${APP_SECRET:-dev-only-change-me-dev-only-change-me}}
      STORE_ENCRYPTION_KEY: ${NOVU_STORE_ENCRYPTION_KEY:-dev-only-change-me-dev-only-change-me}
      NOVU_SECRET_KEY: ${NOVU_SECRET_KEY:-dev-only-change-me-dev-only-change-me}
      SUBSCRIBER_WIDGET_JWT_EXPIRATION_TIME: ${NOVU_WIDGET_JWT_TTL:-15 days}
      IS_API_RATE_LIMITING_ENABLED: "false"
      IS_API_IDEMPOTENCY_ENABLED: "true"
    ports:
      # Host binding so `curl http://localhost:3030/v1/health-check`
      # works during the smoke. Caddy can front this at
      # https://notify.localhost in a later ticket.
      - "${NOVU_API_PORT:-3030}:3000"
    networks: [appnet]
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/v1/health-check || exit 1"
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 60s

  novu-worker:
    image: ghcr.io/novuhq/novu/worker:3.15.0
    container_name: vidgen-novu-worker
    profiles: [core]
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3004
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-novu}:${MONGO_INITDB_ROOT_PASSWORD:-change-me}@mongodb:27017/novu-db?authSource=admin
      MONGO_MIN_POOL_SIZE: ${MONGO_MIN_POOL_SIZE:-1}
      MONGO_MAX_POOL_SIZE: ${MONGO_MAX_POOL_SIZE:-10}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB_INDEX: 2
      REDIS_CACHE_SERVICE_HOST: redis
      REDIS_CACHE_SERVICE_PORT: 6379
      S3_LOCAL_STACK: ""
      STORE_ENCRYPTION_KEY: ${NOVU_STORE_ENCRYPTION_KEY:-dev-only-change-me-dev-only-change-me}
      SUBSCRIBER_WIDGET_JWT_EXPIRATION_TIME: ${NOVU_WIDGET_JWT_TTL:-15 days}
      API_ROOT_URL: http://novu-api:3000
      BROADCAST_QUEUE_CHUNK_SIZE: 100
      MULTICAST_QUEUE_CHUNK_SIZE: 100
    networks: [appnet]
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget --no-verbose --tries=1 --spider http://127.0.0.1:3004/v1/health-check || exit 1"
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 60s

  novu-ws:
    image: ghcr.io/novuhq/novu/ws:3.15.0
    container_name: vidgen-novu-ws
    profiles: [core]
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3002
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-novu}:${MONGO_INITDB_ROOT_PASSWORD:-change-me}@mongodb:27017/novu-db?authSource=admin
      MONGO_MIN_POOL_SIZE: ${MONGO_MIN_POOL_SIZE:-1}
      MONGO_MAX_POOL_SIZE: ${MONGO_MAX_POOL_SIZE:-10}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB_INDEX: 2
      JWT_SECRET: ${NOVU_JWT_SECRET:-${APP_SECRET:-dev-only-change-me-dev-only-change-me}}
    ports:
      - "${NOVU_WS_PORT:-3032}:3002"
    networks: [appnet]
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget --no-verbose --tries=1 --spider http://127.0.0.1:3002/v1/health-check || exit 1"
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 40s

  novu-dashboard:
    image: ghcr.io/novuhq/novu/dashboard:3.15.0
    container_name: vidgen-novu-dashboard
    profiles: [core]
    restart: unless-stopped
    depends_on:
      novu-api:
        condition: service_healthy
      novu-worker:
        condition: service_healthy
    environment:
      VITE_API_HOSTNAME: ${NOVU_API_ROOT_URL:-http://localhost:${NOVU_API_PORT:-3030}}
      VITE_WEBSOCKET_HOSTNAME: ${NOVU_WS_ROOT_URL:-http://localhost:${NOVU_WS_PORT:-3032}}
    ports:
      - "${NOVU_DASHBOARD_PORT:-4000}:4000"
    networks: [appnet]
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'node -e "const http=require(''http'');const req=http.get({hostname:''localhost'',port:4000,path:''/'',timeout:5000},(res)=>process.exit(res.statusCode===200?0:1));req.on(''error'',()=>process.exit(1));req.on(''timeout'',()=>{req.destroy();process.exit(1);});"'
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 30s

  # Caddy reverse proxy (T-014).
  #
  # Architecture references:
  #   - §10  — Caddy in front, automatic Let's Encrypt for real domains,
  #            self-signed (Caddy's internal CA) for *.localhost in dev.
  #   - §4.1 — Part of the `core` profile (always on).
  #
  # No `depends_on` — Caddy boots independently and returns 502 if an
  # upstream isn't up yet. This keeps iteration fast and matches the
  # acceptance criterion (HTTPS terminates regardless of upstream state).
  caddy:
    image: caddy:2.8.4-alpine
    container_name: vidgen-caddy
    profiles: [core]
    restart: unless-stopped
    ports:
      # 80  → HTTP (Caddy auto-redirects to HTTPS for matched sites).
      # 443 → HTTPS (TCP + UDP for HTTP/3 / QUIC).
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTPS_PORT:-443}:443/udp"
    environment:
      # Used only when a real public domain swaps in; *.localhost stays on
      # `tls internal` regardless.
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:-change-me@example.com}
      CADDY_LOG_LEVEL: ${CADDY_LOG_LEVEL:-INFO}
      # Per-site upstreams. Defaults match the layout this ticket ships:
      # in-network container names for services that already have a
      # container in `core`, and `host.docker.internal:PORT` for services
      # that haven't moved into the compose stack yet. T-015 added the
      # `api` container, so API_UPSTREAM now defaults to `api:3001`.
      # T-016 added the `web` container, so APP_UPSTREAM now defaults to
      # `web:3000` (was `host.docker.internal:3000`).
      APP_UPSTREAM: ${APP_UPSTREAM:-web:3000}
      API_UPSTREAM: ${API_UPSTREAM:-api:3001}
      SHARE_UPSTREAM: ${SHARE_UPSTREAM:-host.docker.internal:3002}
      AUTH_UPSTREAM: ${AUTH_UPSTREAM:-keycloak:8080}
      S3_UPSTREAM: ${S3_UPSTREAM:-minio:9000}
      MINIO_CONSOLE_UPSTREAM: ${MINIO_CONSOLE_UPSTREAM:-minio:9001}
      TUS_UPSTREAM: ${TUS_UPSTREAM:-tusd:1080}
      TEMPORAL_UI_UPSTREAM: ${TEMPORAL_UI_UPSTREAM:-temporal-ui:8080}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      # Docker Desktop injects this automatically on macOS / Windows; we
      # declare it explicitly so the same compose works on Linux runners
      # (Docker engine), which is what CI uses.
      - "host.docker.internal:host-gateway"
    networks: [appnet]
    healthcheck:
      # Caddy's admin API is bound to :2019 inside the container. If
      # `/config/` returns 200, the server has parsed the Caddyfile and is
      # accepting connections. 127.0.0.1 avoids IPv4/IPv6 ambiguity.
      test:
        - "CMD-SHELL"
        - "wget -qO- http://127.0.0.1:2019/config/ >/dev/null || exit 1"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Fastify API service (T-015).
  #
  # Architecture references:
  #   - §3.10 — Fastify gateway exposing the OpenAPI contract.
  #   - §4.1  — Part of the `core` profile (always on).
  #   - §11   — Multi-tenant isolation via Postgres RLS — the api connects
  #             as the non-superuser `app` role and sets app.workspace_id
  #             / app.user_id per request.
  #
  # api-migrate is a one-shot sidecar: it runs Drizzle migrations against
  # the superuser DB URL and exits 0 on success. `api` waits for it via
  # `condition: service_completed_successfully` so a freshly-volume-less
  # stack auto-applies migrations on first boot. Same pattern as
  # keycloak-init.
  api-migrate:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    image: vidgen/api:dev
    container_name: vidgen-api-migrate
    profiles: [core]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_SECRET: ${APP_SECRET:-dev-only-change-me-dev-only-change-me}
      # Migration script uses the SUPERUSER credentials so it can create
      # the RLS policies & functions owned by a role that bypasses RLS.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-vidgen}
      # The application user (used by the runtime api container) — referenced
      # by some migrations that GRANT EXECUTE on SECURITY DEFINER functions
      # to the app role.
      APP_DB_USER: ${POSTGRES_USER:-app}
    command: ["pnpm", "--filter", "@vidgen/api", "db:migrate"]
    networks: [appnet]

  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    image: vidgen/api:dev
    container_name: vidgen-api
    profiles: [core]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_PORT: 3001
      API_PUBLIC_URL: ${API_PUBLIC_URL:-https://api.localhost}
      APP_SECRET: ${APP_SECRET:-dev-only-change-me-dev-only-change-me}
      # Runtime app credentials — the non-superuser, RLS-bound role.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-vidgen}
      # OIDC. The expected issuer (`iss` claim) is the public URL the
      # browser-facing Keycloak gives out; the JWKS endpoint we fetch
      # internally has to be the in-network hostname because *.localhost
      # is not resolvable from inside Docker.
      KEYCLOAK_ISSUER_URL: ${KEYCLOAK_ISSUER_URL:-https://auth.localhost/realms/app}
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_JWKS_URL:-http://keycloak:8080/realms/app/protocol/openid-connect/certs}
      KEYCLOAK_CLIENT_ID_API: ${KEYCLOAK_CLIENT_ID_API:-app-api}
      KEYCLOAK_CLIENT_SECRET_API: ${KEYCLOAK_CLIENT_SECRET_API:-change-me}
      KEYCLOAK_ALLOWED_AZP: ${KEYCLOAK_ALLOWED_AZP:-app-web,app-api}
      # T-022 event bus — fan-out to webhooks (T-023) lands here.
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      # T-031 — start IngestAssetWorkflow from the tus post-finish hook.
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-app}
      INGEST_TASK_QUEUE: ${INGEST_TASK_QUEUE:-light}
      # T-030/31 internal HMAC. Defaults to APP_SECRET if blank.
      API_INTERNAL_TOKEN: ${API_INTERNAL_TOKEN:-}
    ports:
      # Dev-only host binding so `curl http://localhost:3001/health` works
      # without going through Caddy. Caddy fronts the same port at
      # https://api.localhost (default API_UPSTREAM=api:3001).
      - "${API_PORT:-3001}:3001"
    networks: [appnet]
    healthcheck:
      # Use Node to GET /health — no curl/wget needed in the alpine image.
      test:
        - "CMD-SHELL"
        - 'node -e "fetch(''http://127.0.0.1:3001/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  # ---------------------------------------------------------------------------
  # tusd — resumable upload server (T-030).
  #
  # Architecture references:
  #   - §3.1 — uploads enter via tus, the only supported upload protocol.
  #   - §5.1 — chunks land in the `media-chunks` bucket; the ingest
  #            workflow's `finalizeUpload` activity moves them to
  #            `media-raw/{ws}/{asset}/source.{ext}` once complete.
  #   - §11  — pre-create + post-finish hooks enforce membership via
  #            the API's `/internal/tus/*` routes.
  #
  # The upstream tusd image is a single static binary; we pin a
  # multi-arch tag so Apple Silicon devs aren't stuck under Rosetta.
  # The S3 backend stores chunks under `media-chunks/`. We delete
  # chunks after `finalizeUpload` (no need for tusd's own GC).
  #
  # Hooks: tusd POSTs to http://api:3001/internal/tus/{pre-create,
  # post-finish}. The pre-create hook validates the user's JWT
  # (carried in Upload-Metadata) and the workspace membership; the
  # post-finish hook starts an IngestAssetWorkflow.
  tusd:
    image: tusproject/tusd:v2.5.0
    container_name: vidgen-tusd
    profiles: [core]
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    command:
      - "-s3-bucket=${MINIO_BUCKET_CHUNKS:-media-chunks}"
      - "-s3-endpoint=${MINIO_INTERNAL_ENDPOINT:-http://minio:9000}"
      - "-port=1080"
      - "-base-path=/files/"
      # Hooks. `-hooks-http` is the BASE url; tusd appends the event
      # name (pre-create, post-finish, …). We enable only the two
      # we use; tusd doesn't fire the disabled ones, saving round-trips.
      - "-hooks-http=http://api:3001/internal/tus"
      - "-hooks-enabled-events=pre-create,post-finish"
      # Behind Caddy. tusd should trust the X-Forwarded-* headers Caddy
      # sets so its `Location` response points at upload.localhost.
      - "-behind-proxy"
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-change-me}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-change-me}
      AWS_REGION: ${MINIO_REGION:-us-east-1}
    ports:
      - "${TUSD_PORT:-1080}:1080"
    networks: [appnet]
    healthcheck:
      # tusd serves a tus-Resumable: 1.0.0 OPTIONS on / by default. A
      # successful POST without a body to /files/ would create an
      # upload; we don't want side effects in a healthcheck, so probe
      # the metrics endpoint instead (exposed by default on the same
      # port at /metrics).
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:1080/metrics > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ---------------------------------------------------------------------------
  # DragonflyDB — Redis-compatible cache (T-017).
  #
  # Architecture references:
  #   - §5.1 — Redis / DragonflyDB is the cache, rate-limit store, and
  #            Yjs awareness ephemeral state holder.
  #   - §4.1 — Part of the `core` profile (always on).
  #
  # Why Dragonfly over vanilla Redis: per docs/decisions.md context, Dragonfly
  # is BSL-licensed (free for our use — single-org operator, not offered as a
  # managed DBaaS) and is wire-compatible with Redis clients. It does not
  # implement a Redis-style AOF; persistence is snapshot-based via `--dir`
  # + an auto-snapshot cron. We accept the trade-off because (a) the ticket
  # explicitly authorised Dragonfly and (b) cache contents are recoverable.
  #
  # Wire compat: clients connect with REDIS_URL=redis://...; everything from
  # `ioredis` to `redis-cli` Just Works.
  redis:
    # Multi-arch (amd64 + arm64) image is published on ghcr.io, not Docker
    # Hub (the docker.io publish appears amd64-only). Apple-Silicon devs
    # would otherwise be hit by Rosetta emulation, so we pin the ghcr.io
    # variant explicitly.
    image: ghcr.io/dragonflydb/dragonfly:v1.30.3
    container_name: vidgen-redis
    profiles: [core]
    restart: unless-stopped
    # `ulimits` is required by Dragonfly for memory mapping. Without it
    # the container exits immediately with "Cannot open /proc/self/limits".
    ulimits:
      memlock: -1
    command:
      - "--logtostderr"
      # Persistence: snapshot every 5 minutes into /data. Dragonfly writes
      # a *.dfs file per shard and an entry for re-opening on next boot.
      - "--dir=/data"
      - "--dbfilename=dump"
      - "--snapshot_cron=*/5 * * * *"
      # Single-port mode — exposes only 6379 for the Redis protocol; the
      # admin HTTP UI on 6380 stays disabled by default (no flag).
      - "--port=6379"
      # Bind to all interfaces so the host port mapping works on Linux,
      # macOS, and Windows. We have no auth here — same as MinIO/postgres
      # in the core profile (local-dev convention; production uses
      # `--requirepass`).
      - "--bind=0.0.0.0"
    ports:
      # Dev host binding so `redis-cli -h localhost ping` from the host
      # works. In-network services reach this as `redis:6379`.
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks: [appnet]
    healthcheck:
      # Dragonfly's image bundles `redis-cli`, so use it for the most
      # direct liveness check possible. `-q` suppresses the banner; we
      # match exactly "PONG" on stdout. Catches the "process is up but
      # not accepting connections" window that a `pgrep` would miss.
      test: ["CMD-SHELL", "redis-cli -h 127.0.0.1 -p 6379 ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Web app shell — Next.js App Router (T-016).
  #
  # Architecture references:
  #   - §8.1 — Next.js + Tailwind + shadcn primitives + TanStack Query.
  #   - §4.1 — Part of the `core` profile (always on).
  #   - §3.10 — Talks to the API via @vidgen/sdk-ts (OpenAPI-generated).
  #
  # Auth flow:
  #   - Browser uses KEYCLOAK_PUBLIC_ISSUER_URL (https://auth.localhost via
  #     Caddy) for PKCE authorize / userinfo / RP-logout.
  #   - The Next.js server-side code (route handlers) hits the SAME URL for
  #     the token-exchange callback. This requires the web container to
  #     trust Caddy's local CA — we mount the `caddy_data` volume read-only
  #     at /caddy-pki and point NODE_EXTRA_CA_CERTS at the root cert that
  #     Caddy generates on first boot.
  #
  # The token's `iss` claim therefore matches the API's KEYCLOAK_ISSUER_URL
  # default (https://auth.localhost/realms/app) — no dual-issuer footgun.
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    image: vidgen/web:dev
    container_name: vidgen-web
    profiles: [core]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      caddy:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WEB_PORT: 3000
      WEB_PUBLIC_URL: ${WEB_PUBLIC_URL:-https://app.localhost}
      # Cookie sealing key — reuses APP_SECRET (32+ char). iron-session
      # AES-GCM-256 with this as the password.
      APP_SECRET: ${APP_SECRET:-dev-only-change-me-dev-only-change-me}
      # OIDC — public issuer is what the browser navigates to; internal
      # endpoints are the same because the web container trusts the Caddy
      # CA (see NODE_EXTRA_CA_CERTS below).
      KEYCLOAK_PUBLIC_ISSUER_URL: ${KEYCLOAK_PUBLIC_ISSUER_URL:-https://auth.localhost/realms/app}
      KEYCLOAK_CLIENT_ID_WEB: ${KEYCLOAK_CLIENT_ID_WEB:-app-web}
      # Where the Next.js server proxies SDK calls to. In-network so the
      # call doesn't bounce through Caddy.
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:3001}
      # Where the browser can reach the API (only used in `<a href>`
      # links / docs). Defaults to the Caddy-fronted URL.
      NEXT_PUBLIC_API_PUBLIC_URL: ${API_PUBLIC_URL:-https://api.localhost}
      # Make the local Caddy CA available to Node's HTTPS layer. The
      # `caddy_data` volume is mounted at /caddy-pki below. Caddy writes
      # the root cert here on first start; the file path matches every
      # supported Caddy version's PKI layout.
      NODE_EXTRA_CA_CERTS: /caddy-pki/caddy/pki/authorities/local/root.crt
    ports:
      # Dev host binding so `curl http://localhost:3000/` works without
      # going through Caddy. Caddy fronts this at https://app.localhost
      # (default APP_UPSTREAM=web:3000, set in the caddy service env above).
      - "${WEB_PORT:-3000}:3000"
    volumes:
      # Read-only mount of Caddy's data dir; we only need root.crt out of
      # it. Caddy writes the cert on first boot — the `depends_on:
      # caddy.condition: service_healthy` above guarantees it's present
      # by the time the web container starts.
      - caddy_data:/caddy-pki:ro
    networks: [appnet]
    extra_hosts:
      # The web container needs to resolve `auth.localhost` for the
      # server-side OIDC token exchange when KEYCLOAK_PUBLIC_ISSUER_URL
      # points at the Caddy-fronted URL (compose default). Routing it via
      # the host gateway lets it traverse the host's port 443 → caddy:443
      # → keycloak.
      - "auth.localhost:host-gateway"
      - "api.localhost:host-gateway"
      # Same idea for the direct http://localhost:8080/realms/app issuer
      # path used by api-smoke.sh: route `localhost` through the host
      # gateway so the SSR openid-client can reach the Keycloak port
      # mapping. Safe inside the dev compose stack — the web container
      # doesn't bind anything on 127.0.0.1 internally.
      - "localhost:host-gateway"
    healthcheck:
      # Next.js standalone serves on $WEB_PORT immediately after boot. A
      # successful GET on `/` (which redirects to /login when anonymous)
      # is sufficient liveness.
      test:
        - "CMD-SHELL"
        - 'node -e "fetch(''http://127.0.0.1:3000/api/healthz'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Temporal — durable workflow plane (T-020).
  #
  # Architecture references:
  #   - §6   — Temporal is the spine for every long op (ingest, transcribe,
  #            render, dub, clip-gen, publish). Workers join in T-021+.
  #   - §5.1 — Postgres is the primary OLTP store; Temporal reuses the same
  #            T-010 cluster (no second postgres container).
  #
  # The auto-setup image takes care of:
  #   - waiting for the DB (DB_PORT defaults to 3306, so we MUST set 5432),
  #   - running the schema migrations on the two pre-created DBs,
  #   - registering DEFAULT_NAMESPACE before starting the frontend.
  #
  # Profile placement: the ticket explicitly overrides arch §4.1 — the
  # original section lists "Temporal Web" under `dev`; T-020 places BOTH
  # the server and the UI in `core` because the workflow plane is core to
  # every long op and the UI is the only observability surface dev gets
  # before the OTel stack lands (phase 12).
  temporal-init:
    image: postgres:16-alpine
    container_name: vidgen-temporal-init
    profiles: [core]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_SUPERUSER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_SUPERUSER_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-vidgen}
      TEMPORAL_DB_USER: ${TEMPORAL_DB_USER:-temporal}
      TEMPORAL_DB_PASSWORD: ${TEMPORAL_DB_PASSWORD:-change-me}
      TEMPORAL_DB_NAME: ${TEMPORAL_DB_NAME:-temporal}
      TEMPORAL_VISIBILITY_DB_NAME: ${TEMPORAL_VISIBILITY_DB_NAME:-temporal_visibility}
    entrypoint: ["/bin/sh", "/etc/temporal/init.sh"]
    volumes:
      - ./temporal/init.sh:/etc/temporal/init.sh:ro
    networks: [appnet]

  temporal:
    # `auto-setup` bundles the frontend / history / matching / worker server
    # plus a one-shot schema-migrate + namespace-register on boot. Pinning
    # to a dated release for reproducibility; multi-arch image (amd64 +
    # arm64) verified on Docker Hub so Apple-Silicon devs aren't forced
    # through Rosetta. Renovate/Dependabot can bump.
    image: temporalio/auto-setup:${TEMPORAL_VERSION:-1.29.6}
    container_name: vidgen-temporal
    profiles: [core]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      temporal-init:
        condition: service_completed_successfully
    environment:
      # SQL backend selection. `postgres12` is the schema flavor used for
      # every Postgres >= 12 (we run 16 from T-010). Do NOT change to
      # `postgresql` — that's the legacy 9.x flavor and the migrations
      # silently mismatch.
      DB: postgres12
      # MUST be set explicitly — auto-setup's default is 3306 (MySQL)
      # which causes the wait_for_db loop to hang forever against our
      # Postgres on 5432.
      DB_PORT: 5432
      # Connection target. POSTGRES_SEEDS is the comma-separated list of
      # hosts auto-setup probes; one entry is fine for the local cluster.
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: ${TEMPORAL_DB_USER:-temporal}
      POSTGRES_PWD: ${TEMPORAL_DB_PASSWORD:-change-me}
      # Database names. Both are pre-created by `temporal-init` with the
      # `temporal` role as owner — so the role itself does NOT need
      # CREATEDB and we set SKIP_DB_CREATE=true to short-circuit the
      # built-in `CREATE DATABASE` step in auto-setup.
      DBNAME: ${TEMPORAL_DB_NAME:-temporal}
      VISIBILITY_DBNAME: ${TEMPORAL_VISIBILITY_DB_NAME:-temporal_visibility}
      SKIP_DB_CREATE: "true"
      # Namespace registration. Default in upstream auto-setup is
      # `default`; the ticket mandates `app`.
      DEFAULT_NAMESPACE: ${TEMPORAL_NAMESPACE:-app}
      # Short retention is fine for dev — 24h means visibility queries
      # are bounded; phase-12 ops work raises this per-namespace.
      DEFAULT_NAMESPACE_RETENTION: 24h
      # Dynamic config knobs (255-byte IDs, dev search-attribute cache
      # refresh). Path is relative to the image's TEMPORAL_HOME=/etc/temporal.
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development.yaml
      # gRPC + admin addresses. Mostly for the bundled `temporal` CLI
      # smoke commands inside the container.
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
    ports:
      # Frontend gRPC. Workers + Temporal SDK clients connect here. Direct
      # host binding so workers running outside the compose network
      # (e.g. `pnpm dev` against the host) can still reach it.
      - "${TEMPORAL_GRPC_PORT:-7233}:7233"
    volumes:
      # Mounts the upstream-style dynamicconfig directory at the path
      # DYNAMIC_CONFIG_FILE_PATH expects (relative to /etc/temporal).
      - ./temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    networks: [appnet]
    healthcheck:
      # The auto-setup image bundles the `temporal` CLI (and tctl). The
      # operator subcommand returns SERVING once the frontend service is
      # up. NOTE: temporal-server binds to the container's eth0 IP
      # (resolvable via the service name `temporal` over Docker's
      # embedded DNS), NOT to 127.0.0.1 — so the healthcheck has to use
      # the service hostname even though the CLI is running inside the
      # same container.
      test:
        - "CMD-SHELL"
        - "temporal --address temporal:7233 operator cluster health 2>/dev/null | grep -q SERVING"
      # Long start_period because the boot sequence is: wait-for-DB →
      # create-schema → register-namespace → start frontend. Empty
      # cluster + fresh DB ~ 30-60 s on a laptop.
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  temporal-ui:
    image: temporalio/ui:${TEMPORAL_UI_VERSION:-2.50.0}
    container_name: vidgen-temporal-ui
    profiles: [core]
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      # CORS allow-list. The UI's own assets are served same-origin so
      # this only matters for the rare external script; permit both the
      # Caddy-fronted and direct host-port origins so either works.
      TEMPORAL_CORS_ORIGINS: https://temporal.localhost,http://localhost:${TEMPORAL_UI_PORT:-8088}
    ports:
      # Dev host binding so `curl http://localhost:8088/` works without
      # going through Caddy. Caddy fronts this at https://temporal.localhost
      # via the TEMPORAL_UI_UPSTREAM env on the caddy service.
      - "${TEMPORAL_UI_PORT:-8088}:8080"
    networks: [appnet]
    healthcheck:
      # The UI is a Go binary that serves a SPA on :8080 immediately
      # after boot. wget ships in the base image (distroless: no; alpine
      # base: yes). A 200 on `/` is sufficient liveness.
      test:
        - "CMD-SHELL"
        - "wget -qO- http://127.0.0.1:8080/ >/dev/null || exit 1"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  temporal-admin-tools:
    # CLI sidecar used by `scripts/temporal-smoke.sh` and by operators who
    # want an interactive `temporal` shell. Sleeps forever so the
    # container stays up and `docker compose exec` works; it does NOT
    # depend on `temporal` because we want `docker compose --profile dev
    # up -d temporal-admin-tools` to work standalone. If `temporal:7233`
    # isn't reachable the CLI commands fail loudly, which is fine.
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION:-1.29.6.1-tctl-1.18.4-cli-1.7.0}
    container_name: vidgen-temporal-admin-tools
    profiles: [dev]
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
    # The default ENTRYPOINT runs `tctl` or `temporal` interactively;
    # override with sleep so the container stays in the background.
    entrypoint: ["sleep", "infinity"]
    networks: [appnet]

  # --- worker pools -------------------------------------------------------
  # vidgen Temporal workers (T-021). Four pools, one per capability class
  # (arch §6.2). Each pool ships its own thin Dockerfile that FROMs the
  # shared base image; `worker-base` is a build-only sidecar that exists
  # solely to produce that base image (`vidgen/worker-base:dev`) before
  # the pool images try to build on top of it.
  #
  # Activities + workflows are empty at T-021 — the workers boot, log a
  # capability banner, and register as pollers on their task queue. Later
  # tickets (T-031, T-032, T-040, T-041, T-062, T-090, T-091, T-130, …)
  # fill in the activities for each pool.
  #
  # depends_on chains:
  #   worker-base (one-shot build)  ──►  worker-{light,media,ai-cpu,ai-gpu}
  #   temporal (service_healthy)    ──►  worker-{light,media,ai-cpu,ai-gpu}
  #
  # See services/worker/README.md for the layout and run instructions.

  # Build-only sidecar: tags vidgen/worker-base:dev so pool Dockerfiles
  # can FROM it. Compose builds this image the first time any worker
  # service starts because every pool `depends_on: worker-base:
  # service_completed_successfully` — guarantees the base image exists
  # in the local store before BuildKit hits a `FROM vidgen/worker-base:dev`.
  worker-base:
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile.base
    image: vidgen/worker-base:dev
    container_name: vidgen-worker-base
    # `core` so it's built whenever ANY worker pool is requested via
    # `--profile core` (the most common dev invocation). Also tagged
    # into the heavier profiles so `--profile media` alone still works.
    profiles: [core, media, ai-cpu, ai-gpu]
    restart: "no"
    # The base image is never run as a service; it just needs to exist.
    # `/bin/true` returns 0 so compose sees the one-shot completed.
    entrypoint: ["true"]
    networks: [appnet]

  worker-light:
    build:
      context: ../..
      dockerfile: services/worker/light/Dockerfile
    image: vidgen/worker-light:dev
    container_name: vidgen-worker-light
    profiles: [core]
    restart: unless-stopped
    depends_on:
      worker-base:
        condition: service_completed_successfully
      temporal:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-app}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      # T-030/31 storage + API internal endpoints (finalize-upload +
      # create-rendition activities).
      MINIO_ENDPOINT: ${MINIO_INTERNAL_ENDPOINT:-http://minio:9000}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-change-me}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
      MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW:-media-raw}
      MINIO_BUCKET_DERIVED: ${MINIO_BUCKET_DERIVED:-media-derived}
      MINIO_BUCKET_CHUNKS: ${MINIO_BUCKET_CHUNKS:-media-chunks}
      MINIO_BUCKET_PUBLIC: ${MINIO_BUCKET_PUBLIC:-public}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:3001}
      API_INTERNAL_TOKEN: ${API_INTERNAL_TOKEN:-}
      APP_SECRET: ${APP_SECRET:-dev-only-change-me-dev-only-change-me}
    networks: [appnet]

  worker-media:
    build:
      context: ../..
      dockerfile: services/worker/media/Dockerfile
    image: vidgen/worker-media:dev
    container_name: vidgen-worker-media
    profiles: [media]
    restart: unless-stopped
    depends_on:
      worker-base:
        condition: service_completed_successfully
      temporal:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-app}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      # T-032 ffmpeg activities read/write through the S3 adapter.
      MINIO_ENDPOINT: ${MINIO_INTERNAL_ENDPOINT:-http://minio:9000}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-change-me}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
      MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW:-media-raw}
      MINIO_BUCKET_DERIVED: ${MINIO_BUCKET_DERIVED:-media-derived}
      MINIO_BUCKET_CHUNKS: ${MINIO_BUCKET_CHUNKS:-media-chunks}
      MINIO_BUCKET_PUBLIC: ${MINIO_BUCKET_PUBLIC:-public}
    networks: [appnet]

  worker-ai-cpu:
    build:
      context: ../..
      dockerfile: services/worker/ai-cpu/Dockerfile
    image: vidgen/worker-ai-cpu:dev
    container_name: vidgen-worker-ai-cpu
    profiles: [ai-cpu]
    restart: unless-stopped
    depends_on:
      worker-base:
        condition: service_completed_successfully
      temporal:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-app}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
    networks: [appnet]

  worker-ai-gpu:
    build:
      context: ../..
      dockerfile: services/worker/ai-gpu/Dockerfile
    image: vidgen/worker-ai-gpu:dev
    container_name: vidgen-worker-ai-gpu
    profiles: [ai-gpu]
    restart: unless-stopped
    depends_on:
      worker-base:
        condition: service_completed_successfully
      temporal:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-app}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
    networks: [appnet]
    # GPU attachment lives in compose.gpu.override.yml (T-003 scaffold);
    # without it the container starts fine but any activity that calls
    # CUDA will fail at runtime. That's acceptable for dev — operators
    # only deploy this pool when a GPU is attached.

  # --- media --------------------------------------------------------------
  # (worker-media moved into the worker pools block above; the old
  # busybox placeholder is removed.)

  # --- ai-cpu -------------------------------------------------------------
  # (worker-ai-cpu moved into the worker pools block above; the old
  # busybox placeholder is removed.)

  # --- ai-gpu -------------------------------------------------------------
  # (worker-ai-gpu moved into the worker pools block above; the old
  # busybox placeholder is removed.)

  # --- realtime ----------------------------------------------------------
  # NATS JetStream — event bus (T-022).
  #
  # Architecture references:
  #   - §6.1 — workflows emit lifecycle events; downstream services
  #            (Novu T-023, audit log T-120) subscribe.
  #   - §9   — NATS JetStream chosen over Kafka for operational
  #            simplicity at our scale.
  #   - §11  — every event payload is workspace_id-tagged in code
  #            (@vidgen/events schema); the bus itself is workspace-
  #            agnostic.
  #
  # Image pinning policy:
  #   The `nats` image is published multi-arch (amd64 + arm64) on
  #   Docker Hub. We pin to a dated minor so Apple-Silicon devs aren't
  #   forced through Rosetta. Renovate/Dependabot can bump.
  #
  # Ports:
  #   4222 — client protocol (used by @vidgen/events JetStream adapter)
  #   8222 — monitoring HTTP (/varz, /healthz) — bound to localhost only
  #          for the healthcheck and the smoke script
  #
  # Persistence:
  #   `-sd /data` points JetStream at the named `nats_data` volume.
  #   File storage (default for FileStorage) survives container restarts.
  nats:
    image: nats:2.10.24-alpine
    container_name: vidgen-nats
    profiles: [realtime]
    restart: unless-stopped
    command:
      # `--jetstream` enables the JS subsystem (off by default in the
      # core nats-server). `--store_dir` parks the durable state on the
      # named volume so streams + consumer state survive restarts.
      - "--jetstream"
      - "--store_dir=/data"
      # Monitoring endpoint on :8222 — exposes /healthz used by the
      # healthcheck below and /varz used by scripts/events-smoke.sh.
      - "--http_port=8222"
      # Explicit client port for clarity; matches the default and the
      # NATS_URL we publish in .env.example (nats://nats:4222).
      - "--port=4222"
      # Server name surfaced in monitoring + lameduck logs. Useful when
      # we go multi-region (one named server per A1 box).
      - "--name=vidgen-nats"
    ports:
      # 4222 host-bound so workers / tests running outside compose can
      # connect via `nats://localhost:4222`.
      - "${NATS_PORT:-4222}:4222"
      # 8222 host-bound on 127.0.0.1 only — the monitoring endpoint is
      # unauthenticated, never expose it on a real network.
      - "127.0.0.1:${NATS_HTTP_PORT:-8222}:8222"
    volumes:
      - nats_data:/data
    networks: [appnet]
    healthcheck:
      # /healthz on the monitoring port returns 200 + JSON when the
      # server is up. The image is alpine-based and ships `wget`.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8222/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  # --- obs ---------------------------------------------------------------
  obs-placeholder:
    <<: *placeholder
    container_name: vidgen-obs-placeholder
    profiles: [obs]

  # --- dev ---------------------------------------------------------------
  dev-placeholder:
    <<: *placeholder
    container_name: vidgen-dev-placeholder
    profiles: [dev]
